name: Common CI CD

on:
  workflow_call:
    inputs:
      app-type:
        required: true
        type: string
      micro-services:
        required: true
        type: string

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.app-type  == 'java' }}
      - name: Run to build file
        run: mvn clean package
        if: ${{ inputs.app-type  == 'java' }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.micro-services }}-jar
          path: target/${{ inputs.micro-services }}-1.0.jar
          retention-days: 1

  test:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.app-type  == 'nodejs' }}
      - name: Run a One line test
        run: echo npm test
        if: ${{ inputs.app-type  == 'java' }}
      - name: Run a One line test
        run: echo mvn test
        if: ${{ inputs.app-type  == 'python' }}
      - name: Run a One line test
        run: echo pytest test.py

  docker:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.app-type  == 'java' }}
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.micro-services }}-jar
          path: ./
      - name: Docker Login for pushing image
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 444206648334.dkr.ecr.us-east-1.amazonaws.com
      - name: Docker Build
        run: docker build -t 444206648334.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.micro-services }} .
      - name: Docker Push
        run: docker push 444206648334.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.micro-services }}

  dev-deploy:
    needs: docker
    runs-on: self-hosted
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ckolli66/roboshop-helm-v1
      - name: Get kubectl config
        run: aws eks update-kubeconfig --name dev
      - name: Helm deploy app
        run: helm upgrade -i ${{ inputs.micro-services }} . -f microservice-specific-valuesFiles/${{ inputs.micro-services }}.yml

  qa-deploy:
    needs: dev-deploy
    runs-on: self-hosted
    environment: qa
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ckolli66/roboshop-helm-v1
      - name: Get kubectl config
        run: aws eks update-kubeconfig --name dev
      - name: Helm deploy app
        run: echo helm upgrade -i ${{ inputs.micro-services }} . -f microservice-specific-valuesFiles/${{ inputs.micro-services }}.yml

  uat-deploy:
    needs: qa-deploy
    runs-on: self-hosted
    environment: uat
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ckolli66/roboshop-helm-v1
      - name: Get kubectl config
        run: aws eks update-kubeconfig --name dev
      - name: Helm deploy app
        run: echo helm upgrade -i ${{ inputs.micro-services }} . -f microservice-specific-valuesFiles/${{ inputs.micro-services }}.yml

  prod-deploy:
    needs: uat-deploy
    runs-on: self-hosted
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ckolli66/roboshop-helm-v1
      - name: Get kubectl config
        run: aws eks update-kubeconfig --name dev
      - name: Helm deploy app
        run: echo helm upgrade -i ${{ inputs.micro-services }} . -f microservice-specific-valuesFiles/${{ inputs.micro-services }}.yml

